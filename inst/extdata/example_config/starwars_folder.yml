dataset_name: "starwars_folder"
folder: "data/"
format: csv
encoding: "UTF-8"
delimiter: ","

expected_columns:
  - name
  - height
  - mass
  - hair_color
  - skin_color
  - eye_color
  - birth_year
  - sex
  - gender
  - homeworld
  - species
  - films
  - vehicles
  - starships

key_columns:
  - name

rule_overrides:
  max_missing_rate: 0.60
  min_row_count: 80

custom_checks_file: "custom/starwars_custom.R"

column_rules:
  sex:
    allowed_values: ["male", "female", "none", "hermaphroditic"]
  gender:
    allowed_values: ["masculine", "feminine"]
  height:
    min_value: 50
    max_value: 300
  mass:
    min_value: 1
    max_value: 2000
